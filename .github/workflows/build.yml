name: Build PyQt6 for Pyodide

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.45.0
          cache: true

      - name: Build
        run: pixi run build

      - name: Smoke test
        run: pixi run test

      - name: Package
        run: pixi run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyodide-qt
          path: dist/pyodide-qt-*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pyodide-qt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: pyodide-qt-*.zip
          generate_release_notes: true
